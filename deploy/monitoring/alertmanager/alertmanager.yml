global:
  resolve_timeout: 5m

route:
  receiver: oncall-default
  group_by:
    - alertname
    - service
    - topic
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: oncall-critical
      matchers:
        - severity = "critical"
    - receiver: oncall-warning
      matchers:
        - severity = "warning"

receivers:
  - name: oncall-default
    webhook_configs:
      - url: ${ALERTMANAGER_DEFAULT_WEBHOOK_URL}
        send_resolved: true

  - name: oncall-warning
    webhook_configs:
      - url: ${ALERTMANAGER_WARNING_WEBHOOK_URL}
        send_resolved: true

  - name: oncall-critical
    webhook_configs:
      - url: ${ALERTMANAGER_CRITICAL_WEBHOOK_URL}
        send_resolved: true
