groups:
  - name: kafka-asr-pipeline-alerts
    rules:
      - alert: GatewayWsErrorRateHigh
        expr: |
          (
            sum(rate(gateway_ws_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_ws_messages_total[5m])), 1e-6)
          ) > {{ALERT_GATEWAY_WS_ERROR_RATIO_WARNING}}
          and
          sum(rate(gateway_ws_messages_total[5m])) > {{ALERT_GATEWAY_WS_ERROR_MIN_RPS_WARNING}}
        for: {{ALERT_GATEWAY_WS_ERROR_FOR_WARNING}}
        labels:
          severity: warning
          area: gateway
        annotations:
          summary: "Gateway WebSocket error ratio is high"
          description: "gateway.ws.messages.total error ratio > {{ALERT_GATEWAY_WS_ERROR_RATIO_WARNING}} for {{ALERT_GATEWAY_WS_ERROR_FOR_WARNING}}"

      - alert: GatewayWsErrorRateCritical
        expr: |
          (
            sum(rate(gateway_ws_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_ws_messages_total[5m])), 1e-6)
          ) > {{ALERT_GATEWAY_WS_ERROR_RATIO_CRITICAL}}
          and
          sum(rate(gateway_ws_messages_total[5m])) > {{ALERT_GATEWAY_WS_ERROR_MIN_RPS_CRITICAL}}
        for: {{ALERT_GATEWAY_WS_ERROR_FOR_CRITICAL}}
        labels:
          severity: critical
          area: gateway
        annotations:
          summary: "Gateway WebSocket error ratio is critical"
          description: "gateway.ws.messages.total error ratio > {{ALERT_GATEWAY_WS_ERROR_RATIO_CRITICAL}} for {{ALERT_GATEWAY_WS_ERROR_FOR_CRITICAL}}"

      - alert: DownlinkErrorRateHigh
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total[5m])), 1e-6)
          ) > {{ALERT_DOWNLINK_ERROR_RATIO_WARNING}}
          and
          sum(rate(gateway_downlink_messages_total[5m])) > {{ALERT_DOWNLINK_ERROR_MIN_RPS_WARNING}}
        for: {{ALERT_DOWNLINK_ERROR_FOR_WARNING}}
        labels:
          severity: warning
          area: gateway
        annotations:
          summary: "Gateway downlink error ratio is high"
          description: "gateway.downlink.messages.total error ratio > {{ALERT_DOWNLINK_ERROR_RATIO_WARNING}} for {{ALERT_DOWNLINK_ERROR_FOR_WARNING}}"

      - alert: DownlinkErrorRateCritical
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total[5m])), 1e-6)
          ) > {{ALERT_DOWNLINK_ERROR_RATIO_CRITICAL}}
          and
          sum(rate(gateway_downlink_messages_total[5m])) > {{ALERT_DOWNLINK_ERROR_MIN_RPS_CRITICAL}}
        for: {{ALERT_DOWNLINK_ERROR_FOR_CRITICAL}}
        labels:
          severity: critical
          area: gateway
        annotations:
          summary: "Gateway downlink error ratio is critical"
          description: "gateway.downlink.messages.total error ratio > {{ALERT_DOWNLINK_ERROR_RATIO_CRITICAL}} for {{ALERT_DOWNLINK_ERROR_FOR_CRITICAL}}"

      - alert: CommandDispatchSuccessRateLow
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{type="command.dispatch",result="success"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total{type="command.dispatch"}[5m])), 1e-6)
          ) < {{ALERT_COMMAND_DISPATCH_SUCCESS_RATIO_WARNING}}
          and
          sum(rate(gateway_downlink_messages_total{type="command.dispatch"}[5m])) > {{ALERT_COMMAND_DISPATCH_MIN_RPS_WARNING}}
        for: {{ALERT_COMMAND_DISPATCH_FOR_WARNING}}
        labels:
          severity: warning
          area: gateway
        annotations:
          summary: "Command dispatch downlink success ratio is low"
          description: "command.dispatch success ratio < {{ALERT_COMMAND_DISPATCH_SUCCESS_RATIO_WARNING}} for {{ALERT_COMMAND_DISPATCH_FOR_WARNING}}"

      - alert: CommandDispatchSuccessRateCritical
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{type="command.dispatch",result="success"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total{type="command.dispatch"}[5m])), 1e-6)
          ) < {{ALERT_COMMAND_DISPATCH_SUCCESS_RATIO_CRITICAL}}
          and
          sum(rate(gateway_downlink_messages_total{type="command.dispatch"}[5m])) > {{ALERT_COMMAND_DISPATCH_MIN_RPS_CRITICAL}}
        for: {{ALERT_COMMAND_DISPATCH_FOR_CRITICAL}}
        labels:
          severity: critical
          area: gateway
        annotations:
          summary: "Command dispatch downlink success ratio is critical"
          description: "command.dispatch success ratio < {{ALERT_COMMAND_DISPATCH_SUCCESS_RATIO_CRITICAL}} for {{ALERT_COMMAND_DISPATCH_FOR_CRITICAL}}"

      - alert: CommandConfirmTimeoutRateHigh
        expr: |
          (
            sum(rate(command_pipeline_result_total{outcome="confirm_timeout"}[5m]))
            /
            clamp_min(sum(rate(command_pipeline_result_total[5m])), 1e-6)
          ) > {{ALERT_COMMAND_CONFIRM_TIMEOUT_RATIO_WARNING}}
          and
          sum(rate(command_pipeline_result_total[5m])) > {{ALERT_COMMAND_CONFIRM_TIMEOUT_MIN_RPS_WARNING}}
        for: {{ALERT_COMMAND_CONFIRM_TIMEOUT_FOR_WARNING}}
        labels:
          severity: warning
          area: command
        annotations:
          summary: "Command confirm-timeout ratio is high"
          description: "command.pipeline.result.total confirm_timeout ratio > {{ALERT_COMMAND_CONFIRM_TIMEOUT_RATIO_WARNING}} for {{ALERT_COMMAND_CONFIRM_TIMEOUT_FOR_WARNING}}"

      - alert: CommandConfirmTimeoutRateCritical
        expr: |
          (
            sum(rate(command_pipeline_result_total{outcome="confirm_timeout"}[5m]))
            /
            clamp_min(sum(rate(command_pipeline_result_total[5m])), 1e-6)
          ) > {{ALERT_COMMAND_CONFIRM_TIMEOUT_RATIO_CRITICAL}}
          and
          sum(rate(command_pipeline_result_total[5m])) > {{ALERT_COMMAND_CONFIRM_TIMEOUT_MIN_RPS_CRITICAL}}
        for: {{ALERT_COMMAND_CONFIRM_TIMEOUT_FOR_CRITICAL}}
        labels:
          severity: critical
          area: command
        annotations:
          summary: "Command confirm-timeout ratio is critical"
          description: "command.pipeline.result.total confirm_timeout ratio > {{ALERT_COMMAND_CONFIRM_TIMEOUT_RATIO_CRITICAL}} for {{ALERT_COMMAND_CONFIRM_TIMEOUT_FOR_CRITICAL}}"

      - alert: CommandExecutionFailureRateHigh
        expr: |
          (
            sum(rate(command_pipeline_result_total{outcome="execution_failed"}[5m]))
            /
            clamp_min(sum(rate(command_pipeline_result_total[5m])), 1e-6)
          ) > {{ALERT_COMMAND_EXECUTION_FAILURE_RATIO_WARNING}}
          and
          sum(rate(command_pipeline_result_total[5m])) > {{ALERT_COMMAND_EXECUTION_FAILURE_MIN_RPS_WARNING}}
        for: {{ALERT_COMMAND_EXECUTION_FAILURE_FOR_WARNING}}
        labels:
          severity: warning
          area: command
        annotations:
          summary: "Command execution failure ratio is high"
          description: "command.pipeline.result.total execution_failed ratio > {{ALERT_COMMAND_EXECUTION_FAILURE_RATIO_WARNING}} for {{ALERT_COMMAND_EXECUTION_FAILURE_FOR_WARNING}}"

      - alert: CommandExecutionFailureRateCritical
        expr: |
          (
            sum(rate(command_pipeline_result_total{outcome="execution_failed"}[5m]))
            /
            clamp_min(sum(rate(command_pipeline_result_total[5m])), 1e-6)
          ) > {{ALERT_COMMAND_EXECUTION_FAILURE_RATIO_CRITICAL}}
          and
          sum(rate(command_pipeline_result_total[5m])) > {{ALERT_COMMAND_EXECUTION_FAILURE_MIN_RPS_CRITICAL}}
        for: {{ALERT_COMMAND_EXECUTION_FAILURE_FOR_CRITICAL}}
        labels:
          severity: critical
          area: command
        annotations:
          summary: "Command execution failure ratio is critical"
          description: "command.pipeline.result.total execution_failed ratio > {{ALERT_COMMAND_EXECUTION_FAILURE_RATIO_CRITICAL}} for {{ALERT_COMMAND_EXECUTION_FAILURE_FOR_CRITICAL}}"

      - alert: CommandPipelineE2EP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(command_pipeline_e2e_duration_seconds_bucket[5m]))
          ) > {{ALERT_COMMAND_E2E_P95_SECONDS_WARNING}}
        for: {{ALERT_COMMAND_E2E_P95_FOR_WARNING}}
        labels:
          severity: warning
          area: command
        annotations:
          summary: "Command pipeline end-to-end p95 latency is high"
          description: "command.pipeline.e2e.duration p95 > {{ALERT_COMMAND_E2E_P95_SECONDS_WARNING}}s for {{ALERT_COMMAND_E2E_P95_FOR_WARNING}}"

      - alert: CommandPipelineE2EP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(command_pipeline_e2e_duration_seconds_bucket[5m]))
          ) > {{ALERT_COMMAND_E2E_P95_SECONDS_CRITICAL}}
        for: {{ALERT_COMMAND_E2E_P95_FOR_CRITICAL}}
        labels:
          severity: critical
          area: command
        annotations:
          summary: "Command pipeline end-to-end p95 latency is critical"
          description: "command.pipeline.e2e.duration p95 > {{ALERT_COMMAND_E2E_P95_SECONDS_CRITICAL}}s for {{ALERT_COMMAND_E2E_P95_FOR_CRITICAL}}"

      - alert: PipelineErrorRateHigh
        expr: |
          (
            sum by (service) (
              rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total",result="error"}[5m])
            )
            /
            clamp_min(
              sum by (service) (
                rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
              ),
              1e-6
            )
          ) > {{ALERT_PIPELINE_ERROR_RATIO_WARNING}}
          and
          sum by (service) (
            rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
          ) > {{ALERT_PIPELINE_ERROR_MIN_RPS_WARNING}}
        for: {{ALERT_PIPELINE_ERROR_FOR_WARNING}}
        labels:
          severity: warning
          area: pipeline
        annotations:
          summary: "Pipeline error ratio is high for {{ $labels.service }}"
          description: "ASR/Translation/TTS error ratio > {{ALERT_PIPELINE_ERROR_RATIO_WARNING}} for {{ALERT_PIPELINE_ERROR_FOR_WARNING}}"

      - alert: PipelineErrorRateCritical
        expr: |
          (
            sum by (service) (
              rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total",result="error"}[5m])
            )
            /
            clamp_min(
              sum by (service) (
                rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
              ),
              1e-6
            )
          ) > {{ALERT_PIPELINE_ERROR_RATIO_CRITICAL}}
          and
          sum by (service) (
            rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
          ) > {{ALERT_PIPELINE_ERROR_MIN_RPS_CRITICAL}}
        for: {{ALERT_PIPELINE_ERROR_FOR_CRITICAL}}
        labels:
          severity: critical
          area: pipeline
        annotations:
          summary: "Pipeline error ratio is critical for {{ $labels.service }}"
          description: "ASR/Translation/TTS error ratio > {{ALERT_PIPELINE_ERROR_RATIO_CRITICAL}} for {{ALERT_PIPELINE_ERROR_FOR_CRITICAL}}"

      - alert: AsrPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(asr_pipeline_duration_seconds_bucket[5m]))
          ) > {{ALERT_PIPELINE_P95_SECONDS_WARNING}}
        for: {{ALERT_ASR_P95_FOR_WARNING}}
        labels:
          severity: warning
          area: asr
        annotations:
          summary: "ASR pipeline p95 latency is high"
          description: "asr.pipeline.duration p95 > {{ALERT_PIPELINE_P95_SECONDS_WARNING}}s for {{ALERT_ASR_P95_FOR_WARNING}}"

      - alert: AsrPipelineP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(asr_pipeline_duration_seconds_bucket[5m]))
          ) > {{ALERT_PIPELINE_P95_SECONDS_CRITICAL}}
        for: {{ALERT_ASR_P95_FOR_CRITICAL}}
        labels:
          severity: critical
          area: asr
        annotations:
          summary: "ASR pipeline p95 latency is critical"
          description: "asr.pipeline.duration p95 > {{ALERT_PIPELINE_P95_SECONDS_CRITICAL}}s for {{ALERT_ASR_P95_FOR_CRITICAL}}"

      - alert: TranslationPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(translation_pipeline_duration_seconds_bucket[5m]))
          ) > {{ALERT_PIPELINE_P95_SECONDS_WARNING}}
        for: {{ALERT_TRANSLATION_P95_FOR_WARNING}}
        labels:
          severity: warning
          area: translation
        annotations:
          summary: "Translation pipeline p95 latency is high"
          description: "translation.pipeline.duration p95 > {{ALERT_PIPELINE_P95_SECONDS_WARNING}}s for {{ALERT_TRANSLATION_P95_FOR_WARNING}}"

      - alert: TranslationPipelineP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(translation_pipeline_duration_seconds_bucket[5m]))
          ) > {{ALERT_PIPELINE_P95_SECONDS_CRITICAL}}
        for: {{ALERT_TRANSLATION_P95_FOR_CRITICAL}}
        labels:
          severity: critical
          area: translation
        annotations:
          summary: "Translation pipeline p95 latency is critical"
          description: "translation.pipeline.duration p95 > {{ALERT_PIPELINE_P95_SECONDS_CRITICAL}}s for {{ALERT_TRANSLATION_P95_FOR_CRITICAL}}"

      - alert: TtsPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(tts_pipeline_duration_seconds_bucket[5m]))
          ) > {{ALERT_PIPELINE_P95_SECONDS_WARNING}}
        for: {{ALERT_TTS_P95_FOR_WARNING}}
        labels:
          severity: warning
          area: tts
        annotations:
          summary: "TTS pipeline p95 latency is high"
          description: "tts.pipeline.duration p95 > {{ALERT_PIPELINE_P95_SECONDS_WARNING}}s for {{ALERT_TTS_P95_FOR_WARNING}}"

      - alert: TtsPipelineP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(tts_pipeline_duration_seconds_bucket[5m]))
          ) > {{ALERT_PIPELINE_P95_SECONDS_CRITICAL}}
        for: {{ALERT_TTS_P95_FOR_CRITICAL}}
        labels:
          severity: critical
          area: tts
        annotations:
          summary: "TTS pipeline p95 latency is critical"
          description: "tts.pipeline.duration p95 > {{ALERT_PIPELINE_P95_SECONDS_CRITICAL}}s for {{ALERT_TTS_P95_FOR_CRITICAL}}"

      - alert: KafkaConsumerLagHigh
        expr: |
          max by (service, topic) (
            kafka_consumer_records_lag_max{
              service=~"speech-gateway|asr-worker|translation-worker|tts-orchestrator"
            }
          ) > {{ALERT_KAFKA_LAG_WARNING}}
        for: {{ALERT_KAFKA_LAG_FOR_WARNING}}
        labels:
          severity: warning
          area: kafka
        annotations:
          summary: "Kafka consumer lag is high"
          description: "kafka.consumer.records.lag.max > {{ALERT_KAFKA_LAG_WARNING}} for {{ALERT_KAFKA_LAG_FOR_WARNING}}"

      - alert: KafkaConsumerLagCritical
        expr: |
          max by (service, topic) (
            kafka_consumer_records_lag_max{
              service=~"speech-gateway|asr-worker|translation-worker|tts-orchestrator"
            }
          ) > {{ALERT_KAFKA_LAG_CRITICAL}}
        for: {{ALERT_KAFKA_LAG_FOR_CRITICAL}}
        labels:
          severity: critical
          area: kafka
        annotations:
          summary: "Kafka consumer lag is critical"
          description: "kafka.consumer.records.lag.max > {{ALERT_KAFKA_LAG_CRITICAL}} for {{ALERT_KAFKA_LAG_FOR_CRITICAL}}"

      - alert: OrchestratorControlPlaneFallbackSpike
        expr: |
          sum(rate(orchestrator_controlplane_policy_fallback_total[5m])) > {{ALERT_ORCHESTRATOR_FALLBACK_RPS_WARNING}}
        for: {{ALERT_ORCHESTRATOR_FALLBACK_FOR_WARNING}}
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Session orchestrator control-plane fallback is active"
          description: "orchestrator.controlplane.policy.fallback.total > {{ALERT_ORCHESTRATOR_FALLBACK_RPS_WARNING}}/s for {{ALERT_ORCHESTRATOR_FALLBACK_FOR_WARNING}}"

      - alert: OrchestratorControlPlaneFallbackCritical
        expr: |
          sum(rate(orchestrator_controlplane_policy_fallback_total[5m])) > {{ALERT_ORCHESTRATOR_FALLBACK_RPS_CRITICAL}}
        for: {{ALERT_ORCHESTRATOR_FALLBACK_FOR_CRITICAL}}
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Session orchestrator control-plane fallback is critical"
          description: "orchestrator.controlplane.policy.fallback.total > {{ALERT_ORCHESTRATOR_FALLBACK_RPS_CRITICAL}}/s for {{ALERT_ORCHESTRATOR_FALLBACK_FOR_CRITICAL}}"

      - alert: ControlPlaneAuthDenyRateHigh
        expr: |
          (
            sum(
              rate(controlplane_auth_decision_total{
                backend="mode-switch",
                mode=~"external_iam|hybrid",
                outcome=~"unauthorized|forbidden"
              }[5m])
            )
            /
            clamp_min(
              sum(
                rate(controlplane_auth_decision_total{
                  backend="mode-switch",
                  mode=~"external_iam|hybrid"
                }[5m])
              ),
              1e-6
            )
          ) > {{ALERT_CONTROL_AUTH_DENY_RATIO_WARNING}}
          and
          sum(
            rate(controlplane_auth_decision_total{
              backend="mode-switch",
              mode=~"external_iam|hybrid"
            }[5m])
          ) > {{ALERT_CONTROL_AUTH_DENY_MIN_RPS_WARNING}}
        for: {{ALERT_CONTROL_AUTH_DENY_FOR_WARNING}}
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Control-plane auth deny ratio is high"
          description: "controlplane.auth.decision.total deny ratio > {{ALERT_CONTROL_AUTH_DENY_RATIO_WARNING}} for {{ALERT_CONTROL_AUTH_DENY_FOR_WARNING}}"

      - alert: ControlPlaneAuthDenyRateCritical
        expr: |
          (
            sum(
              rate(controlplane_auth_decision_total{
                backend="mode-switch",
                mode=~"external_iam|hybrid",
                outcome=~"unauthorized|forbidden"
              }[5m])
            )
            /
            clamp_min(
              sum(
                rate(controlplane_auth_decision_total{
                  backend="mode-switch",
                  mode=~"external_iam|hybrid"
                }[5m])
              ),
              1e-6
            )
          ) > {{ALERT_CONTROL_AUTH_DENY_RATIO_CRITICAL}}
          and
          sum(
            rate(controlplane_auth_decision_total{
              backend="mode-switch",
              mode=~"external_iam|hybrid"
            }[5m])
          ) > {{ALERT_CONTROL_AUTH_DENY_MIN_RPS_CRITICAL}}
        for: {{ALERT_CONTROL_AUTH_DENY_FOR_CRITICAL}}
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Control-plane auth deny ratio is critical"
          description: "controlplane.auth.decision.total deny ratio > {{ALERT_CONTROL_AUTH_DENY_RATIO_CRITICAL}} for {{ALERT_CONTROL_AUTH_DENY_FOR_CRITICAL}}"

      - alert: ControlPlaneExternalIamUnavailableWarning
        expr: |
          sum(
            rate(controlplane_auth_decision_total{
              backend="external-iam",
              reason="external_unavailable"
            }[5m])
          ) > {{ALERT_CONTROL_EXTERNAL_UNAVAILABLE_RPS_WARNING}}
        for: {{ALERT_CONTROL_EXTERNAL_UNAVAILABLE_FOR_WARNING}}
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Control-plane external IAM unavailable warning"
          description: "controlplane.auth.decision.total{backend=external-iam,reason=external_unavailable} > {{ALERT_CONTROL_EXTERNAL_UNAVAILABLE_RPS_WARNING}}/s for {{ALERT_CONTROL_EXTERNAL_UNAVAILABLE_FOR_WARNING}}"

      - alert: ControlPlaneExternalIamUnavailableSpike
        expr: |
          sum(
            rate(controlplane_auth_decision_total{
              backend="external-iam",
              reason="external_unavailable"
            }[5m])
          ) > {{ALERT_CONTROL_EXTERNAL_UNAVAILABLE_RPS_CRITICAL}}
        for: {{ALERT_CONTROL_EXTERNAL_UNAVAILABLE_FOR_CRITICAL}}
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Control-plane external IAM unavailable spike"
          description: "controlplane.auth.decision.total{backend=external-iam,reason=external_unavailable} > {{ALERT_CONTROL_EXTERNAL_UNAVAILABLE_RPS_CRITICAL}}/s for {{ALERT_CONTROL_EXTERNAL_UNAVAILABLE_FOR_CRITICAL}}"

      - alert: ControlPlaneHybridFallbackSpike
        expr: |
          sum(rate(controlplane_auth_hybrid_fallback_total[5m])) > {{ALERT_CONTROL_HYBRID_FALLBACK_RPS_WARNING}}
        for: {{ALERT_CONTROL_HYBRID_FALLBACK_FOR_WARNING}}
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Control-plane hybrid auth fallback is active"
          description: "controlplane.auth.hybrid.fallback.total > {{ALERT_CONTROL_HYBRID_FALLBACK_RPS_WARNING}}/s for {{ALERT_CONTROL_HYBRID_FALLBACK_FOR_WARNING}}"

      - alert: ControlPlaneHybridFallbackCritical
        expr: |
          sum(rate(controlplane_auth_hybrid_fallback_total[5m])) > {{ALERT_CONTROL_HYBRID_FALLBACK_RPS_CRITICAL}}
        for: {{ALERT_CONTROL_HYBRID_FALLBACK_FOR_CRITICAL}}
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Control-plane hybrid auth fallback is critical"
          description: "controlplane.auth.hybrid.fallback.total > {{ALERT_CONTROL_HYBRID_FALLBACK_RPS_CRITICAL}}/s for {{ALERT_CONTROL_HYBRID_FALLBACK_FOR_CRITICAL}}"
