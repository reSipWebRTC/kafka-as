groups:
  - name: kafka-asr-pipeline-alerts
    rules:
      - alert: GatewayWsErrorRateHigh
        expr: |
          (
            sum(rate(gateway_ws_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_ws_messages_total[5m])), 1e-6)
          ) > 0.01
          and
          sum(rate(gateway_ws_messages_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
          area: gateway
        annotations:
          summary: "Gateway WebSocket error ratio is high"
          description: "gateway.ws.messages.total error ratio > 0.01 for 10m"

      - alert: GatewayWsErrorRateCritical
        expr: |
          (
            sum(rate(gateway_ws_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_ws_messages_total[5m])), 1e-6)
          ) > 0.03
          and
          sum(rate(gateway_ws_messages_total[5m])) > 1
        for: 5m
        labels:
          severity: critical
          area: gateway
        annotations:
          summary: "Gateway WebSocket error ratio is critical"
          description: "gateway.ws.messages.total error ratio > 0.03 for 5m"

      - alert: DownlinkErrorRateHigh
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total[5m])), 1e-6)
          ) > 0.005
          and
          sum(rate(gateway_downlink_messages_total[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
          area: gateway
        annotations:
          summary: "Gateway downlink error ratio is high"
          description: "gateway.downlink.messages.total error ratio > 0.005 for 10m"

      - alert: DownlinkErrorRateCritical
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total[5m])), 1e-6)
          ) > 0.02
          and
          sum(rate(gateway_downlink_messages_total[5m])) > 0.5
        for: 5m
        labels:
          severity: critical
          area: gateway
        annotations:
          summary: "Gateway downlink error ratio is critical"
          description: "gateway.downlink.messages.total error ratio > 0.02 for 5m"

      - alert: CommandDispatchSuccessRateLow
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{type="command.dispatch",result="success"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total{type="command.dispatch"}[5m])), 1e-6)
          ) < 0.995
          and
          sum(rate(gateway_downlink_messages_total{type="command.dispatch"}[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
          area: gateway
        annotations:
          summary: "Command dispatch downlink success ratio is low"
          description: "command.dispatch success ratio < 0.995 for 10m"

      - alert: CommandDispatchSuccessRateCritical
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{type="command.dispatch",result="success"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total{type="command.dispatch"}[5m])), 1e-6)
          ) < 0.980
          and
          sum(rate(gateway_downlink_messages_total{type="command.dispatch"}[5m])) > 0.5
        for: 5m
        labels:
          severity: critical
          area: gateway
        annotations:
          summary: "Command dispatch downlink success ratio is critical"
          description: "command.dispatch success ratio < 0.980 for 5m"

      - alert: CommandConfirmTimeoutRateHigh
        expr: |
          (
            sum(rate(command_pipeline_result_total{outcome="confirm_timeout"}[5m]))
            /
            clamp_min(sum(rate(command_pipeline_result_total[5m])), 1e-6)
          ) > 0.05
          and
          sum(rate(command_pipeline_result_total[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          area: command
        annotations:
          summary: "Command confirm-timeout ratio is high"
          description: "command.pipeline.result.total confirm_timeout ratio > 0.05 for 10m"

      - alert: CommandConfirmTimeoutRateCritical
        expr: |
          (
            sum(rate(command_pipeline_result_total{outcome="confirm_timeout"}[5m]))
            /
            clamp_min(sum(rate(command_pipeline_result_total[5m])), 1e-6)
          ) > 0.15
          and
          sum(rate(command_pipeline_result_total[5m])) > 0.10
        for: 5m
        labels:
          severity: critical
          area: command
        annotations:
          summary: "Command confirm-timeout ratio is critical"
          description: "command.pipeline.result.total confirm_timeout ratio > 0.15 for 5m"

      - alert: CommandExecutionFailureRateHigh
        expr: |
          (
            sum(rate(command_pipeline_result_total{outcome="execution_failed"}[5m]))
            /
            clamp_min(sum(rate(command_pipeline_result_total[5m])), 1e-6)
          ) > 0.03
          and
          sum(rate(command_pipeline_result_total[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          area: command
        annotations:
          summary: "Command execution failure ratio is high"
          description: "command.pipeline.result.total execution_failed ratio > 0.03 for 10m"

      - alert: CommandExecutionFailureRateCritical
        expr: |
          (
            sum(rate(command_pipeline_result_total{outcome="execution_failed"}[5m]))
            /
            clamp_min(sum(rate(command_pipeline_result_total[5m])), 1e-6)
          ) > 0.10
          and
          sum(rate(command_pipeline_result_total[5m])) > 0.10
        for: 5m
        labels:
          severity: critical
          area: command
        annotations:
          summary: "Command execution failure ratio is critical"
          description: "command.pipeline.result.total execution_failed ratio > 0.10 for 5m"

      - alert: CommandPipelineE2EP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(command_pipeline_e2e_duration_seconds_bucket[5m]))
          ) > 5.0
        for: 10m
        labels:
          severity: warning
          area: command
        annotations:
          summary: "Command pipeline end-to-end p95 latency is high"
          description: "command.pipeline.e2e.duration p95 > 5.0s for 10m"

      - alert: CommandPipelineE2EP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(command_pipeline_e2e_duration_seconds_bucket[5m]))
          ) > 8.0
        for: 5m
        labels:
          severity: critical
          area: command
        annotations:
          summary: "Command pipeline end-to-end p95 latency is critical"
          description: "command.pipeline.e2e.duration p95 > 8.0s for 5m"

      - alert: PipelineErrorRateHigh
        expr: |
          (
            sum by (service) (
              rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total",result="error"}[5m])
            )
            /
            clamp_min(
              sum by (service) (
                rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
              ),
              1e-6
            )
          ) > 0.01
          and
          sum by (service) (
            rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          area: pipeline
        annotations:
          summary: "Pipeline error ratio is high for {{ $labels.service }}"
          description: "ASR/Translation/TTS error ratio > 0.01 for 10m"

      - alert: PipelineErrorRateCritical
        expr: |
          (
            sum by (service) (
              rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total",result="error"}[5m])
            )
            /
            clamp_min(
              sum by (service) (
                rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
              ),
              1e-6
            )
          ) > 0.03
          and
          sum by (service) (
            rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
          ) > 0.5
        for: 5m
        labels:
          severity: critical
          area: pipeline
        annotations:
          summary: "Pipeline error ratio is critical for {{ $labels.service }}"
          description: "ASR/Translation/TTS error ratio > 0.03 for 5m"

      - alert: AsrPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(asr_pipeline_duration_seconds_bucket[5m]))
          ) > 1.5
        for: 15m
        labels:
          severity: warning
          area: asr
        annotations:
          summary: "ASR pipeline p95 latency is high"
          description: "asr.pipeline.duration p95 > 1.5s for 15m"

      - alert: AsrPipelineP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(asr_pipeline_duration_seconds_bucket[5m]))
          ) > 3.0
        for: 5m
        labels:
          severity: critical
          area: asr
        annotations:
          summary: "ASR pipeline p95 latency is critical"
          description: "asr.pipeline.duration p95 > 3.0s for 5m"

      - alert: TranslationPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(translation_pipeline_duration_seconds_bucket[5m]))
          ) > 1.5
        for: 15m
        labels:
          severity: warning
          area: translation
        annotations:
          summary: "Translation pipeline p95 latency is high"
          description: "translation.pipeline.duration p95 > 1.5s for 15m"

      - alert: TranslationPipelineP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(translation_pipeline_duration_seconds_bucket[5m]))
          ) > 3.0
        for: 5m
        labels:
          severity: critical
          area: translation
        annotations:
          summary: "Translation pipeline p95 latency is critical"
          description: "translation.pipeline.duration p95 > 3.0s for 5m"

      - alert: TtsPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(tts_pipeline_duration_seconds_bucket[5m]))
          ) > 1.5
        for: 15m
        labels:
          severity: warning
          area: tts
        annotations:
          summary: "TTS pipeline p95 latency is high"
          description: "tts.pipeline.duration p95 > 1.5s for 15m"

      - alert: TtsPipelineP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(tts_pipeline_duration_seconds_bucket[5m]))
          ) > 3.0
        for: 5m
        labels:
          severity: critical
          area: tts
        annotations:
          summary: "TTS pipeline p95 latency is critical"
          description: "tts.pipeline.duration p95 > 3.0s for 5m"

      - alert: KafkaConsumerLagHigh
        expr: |
          max by (service, topic) (
            kafka_consumer_records_lag_max{
              service=~"speech-gateway|asr-worker|translation-worker|tts-orchestrator"
            }
          ) > 1200
        for: 10m
        labels:
          severity: warning
          area: kafka
        annotations:
          summary: "Kafka consumer lag is high"
          description: "kafka.consumer.records.lag.max > 1200 for 10m"

      - alert: KafkaConsumerLagCritical
        expr: |
          max by (service, topic) (
            kafka_consumer_records_lag_max{
              service=~"speech-gateway|asr-worker|translation-worker|tts-orchestrator"
            }
          ) > 5000
        for: 5m
        labels:
          severity: critical
          area: kafka
        annotations:
          summary: "Kafka consumer lag is critical"
          description: "kafka.consumer.records.lag.max > 5000 for 5m"

      - alert: OrchestratorControlPlaneFallbackSpike
        expr: |
          sum(rate(orchestrator_controlplane_policy_fallback_total[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Session orchestrator control-plane fallback is active"
          description: "orchestrator.controlplane.policy.fallback.total > 0.2/s for 10m"

      - alert: OrchestratorControlPlaneFallbackCritical
        expr: |
          sum(rate(orchestrator_controlplane_policy_fallback_total[5m])) > 1.0
        for: 5m
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Session orchestrator control-plane fallback is critical"
          description: "orchestrator.controlplane.policy.fallback.total > 1.0/s for 5m"

      - alert: ControlPlaneAuthDenyRateHigh
        expr: |
          (
            sum(
              rate(controlplane_auth_decision_total{
                backend="mode-switch",
                mode=~"external_iam|hybrid",
                outcome=~"unauthorized|forbidden"
              }[5m])
            )
            /
            clamp_min(
              sum(
                rate(controlplane_auth_decision_total{
                  backend="mode-switch",
                  mode=~"external_iam|hybrid"
                }[5m])
              ),
              1e-6
            )
          ) > 0.20
          and
          sum(
            rate(controlplane_auth_decision_total{
              backend="mode-switch",
              mode=~"external_iam|hybrid"
            }[5m])
          ) > 0.05
        for: 10m
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Control-plane auth deny ratio is high"
          description: "controlplane.auth.decision.total deny ratio > 0.20 for 10m"

      - alert: ControlPlaneAuthDenyRateCritical
        expr: |
          (
            sum(
              rate(controlplane_auth_decision_total{
                backend="mode-switch",
                mode=~"external_iam|hybrid",
                outcome=~"unauthorized|forbidden"
              }[5m])
            )
            /
            clamp_min(
              sum(
                rate(controlplane_auth_decision_total{
                  backend="mode-switch",
                  mode=~"external_iam|hybrid"
                }[5m])
              ),
              1e-6
            )
          ) > 0.40
          and
          sum(
            rate(controlplane_auth_decision_total{
              backend="mode-switch",
              mode=~"external_iam|hybrid"
            }[5m])
          ) > 0.10
        for: 5m
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Control-plane auth deny ratio is critical"
          description: "controlplane.auth.decision.total deny ratio > 0.40 for 5m"

      - alert: ControlPlaneExternalIamUnavailableWarning
        expr: |
          sum(
            rate(controlplane_auth_decision_total{
              backend="external-iam",
              reason="external_unavailable"
            }[5m])
          ) > 0.01
        for: 10m
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Control-plane external IAM unavailable warning"
          description: "controlplane.auth.decision.total{backend=external-iam,reason=external_unavailable} > 0.01/s for 10m"

      - alert: ControlPlaneExternalIamUnavailableSpike
        expr: |
          sum(
            rate(controlplane_auth_decision_total{
              backend="external-iam",
              reason="external_unavailable"
            }[5m])
          ) > 0.05
        for: 10m
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Control-plane external IAM unavailable spike"
          description: "controlplane.auth.decision.total{backend=external-iam,reason=external_unavailable} > 0.05/s for 10m"

      - alert: ControlPlaneHybridFallbackSpike
        expr: |
          sum(rate(controlplane_auth_hybrid_fallback_total[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Control-plane hybrid auth fallback is active"
          description: "controlplane.auth.hybrid.fallback.total > 0.05/s for 10m"

      - alert: ControlPlaneHybridFallbackCritical
        expr: |
          sum(rate(controlplane_auth_hybrid_fallback_total[5m])) > 0.20
        for: 5m
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Control-plane hybrid auth fallback is critical"
          description: "controlplane.auth.hybrid.fallback.total > 0.20/s for 5m"
