groups:
  - name: kafka-asr-pipeline-alerts
    rules:
      - alert: GatewayWsErrorRateHigh
        expr: |
          (
            sum(rate(gateway_ws_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_ws_messages_total[5m])), 1e-6)
          ) > 0.05
          and
          sum(rate(gateway_ws_messages_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
          area: gateway
        annotations:
          summary: "Gateway WebSocket error ratio is high"
          description: "gateway.ws.messages.total error ratio > 5% for 10m"

      - alert: DownlinkErrorRateHigh
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total[5m])), 1e-6)
          ) > 0.03
          and
          sum(rate(gateway_downlink_messages_total[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
          area: gateway
        annotations:
          summary: "Gateway downlink error ratio is high"
          description: "gateway.downlink.messages.total error ratio > 3% for 10m"

      - alert: PipelineErrorRateHigh
        expr: |
          (
            sum by (service) (
              rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total",result="error"}[5m])
            )
            /
            clamp_min(
              sum by (service) (
                rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
              ),
              1e-6
            )
          ) > 0.03
          and
          sum by (service) (
            rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          area: pipeline
        annotations:
          summary: "Pipeline error ratio is high for {{ $labels.service }}"
          description: "ASR/Translation/TTS error ratio > 3% for 10m"

      - alert: AsrPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(asr_pipeline_duration_seconds_bucket[5m]))
          ) > 2
        for: 15m
        labels:
          severity: warning
          area: asr
        annotations:
          summary: "ASR pipeline p95 latency is high"
          description: "asr.pipeline.duration p95 > 2s for 15m"

      - alert: TranslationPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(translation_pipeline_duration_seconds_bucket[5m]))
          ) > 2
        for: 15m
        labels:
          severity: warning
          area: translation
        annotations:
          summary: "Translation pipeline p95 latency is high"
          description: "translation.pipeline.duration p95 > 2s for 15m"

      - alert: TtsPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(tts_pipeline_duration_seconds_bucket[5m]))
          ) > 2
        for: 15m
        labels:
          severity: warning
          area: tts
        annotations:
          summary: "TTS pipeline p95 latency is high"
          description: "tts.pipeline.duration p95 > 2s for 15m"

      - alert: KafkaConsumerLagHigh
        expr: |
          max by (service, topic) (
            kafka_consumer_records_lag_max{
              service=~"speech-gateway|asr-worker|translation-worker|tts-orchestrator"
            }
          ) > 2000
        for: 10m
        labels:
          severity: warning
          area: kafka
        annotations:
          summary: "Kafka consumer lag is high"
          description: "kafka.consumer.records.lag.max > 2000 for service={{ $labels.service }} topic={{ $labels.topic }}"

      - alert: OrchestratorControlPlaneFallbackSpike
        expr: |
          sum(rate(orchestrator_controlplane_policy_fallback_total[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Session orchestrator control-plane fallback is active"
          description: "orchestrator.controlplane.policy.fallback.total > 0.2/s for 10m"
