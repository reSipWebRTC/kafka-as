groups:
  - name: kafka-asr-pipeline-alerts
    rules:
      - alert: GatewayWsErrorRateHigh
        expr: |
          (
            sum(rate(gateway_ws_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_ws_messages_total[5m])), 1e-6)
          ) > 0.01
          and
          sum(rate(gateway_ws_messages_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
          area: gateway
        annotations:
          summary: "Gateway WebSocket error ratio is high"
          description: "gateway.ws.messages.total error ratio > 0.01 for 10m"

      - alert: GatewayWsErrorRateCritical
        expr: |
          (
            sum(rate(gateway_ws_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_ws_messages_total[5m])), 1e-6)
          ) > 0.03
          and
          sum(rate(gateway_ws_messages_total[5m])) > 1
        for: 5m
        labels:
          severity: critical
          area: gateway
        annotations:
          summary: "Gateway WebSocket error ratio is critical"
          description: "gateway.ws.messages.total error ratio > 0.03 for 5m"

      - alert: DownlinkErrorRateHigh
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total[5m])), 1e-6)
          ) > 0.005
          and
          sum(rate(gateway_downlink_messages_total[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
          area: gateway
        annotations:
          summary: "Gateway downlink error ratio is high"
          description: "gateway.downlink.messages.total error ratio > 0.005 for 10m"

      - alert: DownlinkErrorRateCritical
        expr: |
          (
            sum(rate(gateway_downlink_messages_total{result="error"}[5m]))
            /
            clamp_min(sum(rate(gateway_downlink_messages_total[5m])), 1e-6)
          ) > 0.02
          and
          sum(rate(gateway_downlink_messages_total[5m])) > 0.5
        for: 5m
        labels:
          severity: critical
          area: gateway
        annotations:
          summary: "Gateway downlink error ratio is critical"
          description: "gateway.downlink.messages.total error ratio > 0.02 for 5m"

      - alert: GatewayClientFirstSubtitleP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(gateway_client_perceived_duration_seconds_bucket{stage="first_subtitle"}[5m])
            )
          ) > 1.0
          and
          sum(
            rate(gateway_client_perceived_duration_seconds_count{stage="first_subtitle"}[5m])
          ) > 0.2
        for: 10m
        labels:
          severity: warning
          area: experience
        annotations:
          summary: "Gateway client first subtitle p95 latency is high"
          description: "gateway.client.perceived.duration(stage=first_subtitle) p95 > 1.0s for 10m"

      - alert: GatewayClientFinalSubtitleP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(gateway_client_perceived_duration_seconds_bucket{stage="final_subtitle"}[5m])
            )
          ) > 1.8
          and
          sum(
            rate(gateway_client_perceived_duration_seconds_count{stage="final_subtitle"}[5m])
          ) > 0.2
        for: 10m
        labels:
          severity: warning
          area: experience
        annotations:
          summary: "Gateway client final subtitle p95 latency is high"
          description: "gateway.client.perceived.duration(stage=final_subtitle) p95 > 1.8s for 10m"

      - alert: GatewayClientFinalSubtitleP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(gateway_client_perceived_duration_seconds_bucket{stage="final_subtitle"}[5m])
            )
          ) > 3.0
          and
          sum(
            rate(gateway_client_perceived_duration_seconds_count{stage="final_subtitle"}[5m])
          ) > 0.2
        for: 5m
        labels:
          severity: critical
          area: experience
        annotations:
          summary: "Gateway client final subtitle p95 latency is critical"
          description: "gateway.client.perceived.duration(stage=final_subtitle) p95 > 3.0s for 5m"

      - alert: GatewayClientTtsReadyP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(gateway_client_perceived_duration_seconds_bucket{stage="tts_ready"}[5m])
            )
          ) > 2.5
          and
          sum(
            rate(gateway_client_perceived_duration_seconds_count{stage="tts_ready"}[5m])
          ) > 0.2
        for: 10m
        labels:
          severity: warning
          area: experience
        annotations:
          summary: "Gateway client TTS ready p95 latency is high"
          description: "gateway.client.perceived.duration(stage=tts_ready) p95 > 2.5s for 10m"

      - alert: GatewayClientTtsReadyP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(gateway_client_perceived_duration_seconds_bucket{stage="tts_ready"}[5m])
            )
          ) > 4.0
          and
          sum(
            rate(gateway_client_perceived_duration_seconds_count{stage="tts_ready"}[5m])
          ) > 0.2
        for: 5m
        labels:
          severity: critical
          area: experience
        annotations:
          summary: "Gateway client TTS ready p95 latency is critical"
          description: "gateway.client.perceived.duration(stage=tts_ready) p95 > 4.0s for 5m"

      - alert: GatewayClientPlaybackStartP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(gateway_client_playback_duration_seconds_bucket{stage="start"}[5m])
            )
          ) > 1.2
          and
          sum(
            rate(gateway_client_playback_duration_seconds_count{stage="start"}[5m])
          ) > 0.1
        for: 10m
        labels:
          severity: warning
          area: experience
        annotations:
          summary: "Gateway client playback start p95 latency is high"
          description: "gateway.client.playback.duration(stage=start) p95 > 1.2s for 10m"

      - alert: GatewayClientPlaybackStartP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(gateway_client_playback_duration_seconds_bucket{stage="start"}[5m])
            )
          ) > 2.5
          and
          sum(
            rate(gateway_client_playback_duration_seconds_count{stage="start"}[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: critical
          area: experience
        annotations:
          summary: "Gateway client playback start p95 latency is critical"
          description: "gateway.client.playback.duration(stage=start) p95 > 2.5s for 5m"

      - alert: GatewayClientPlaybackStallRatioHigh
        expr: |
          (
            sum(rate(gateway_client_playback_total{stage="stall",result="recorded"}[5m]))
            /
            clamp_min(sum(rate(gateway_client_playback_total{stage="start",result="recorded"}[5m])), 1e-6)
          ) > 0.20
          and
          sum(rate(gateway_client_playback_total{stage="start",result="recorded"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          area: experience
        annotations:
          summary: "Gateway client playback stall ratio is high"
          description: "playback stall/start ratio > 0.20 for 10m"

      - alert: GatewayClientPlaybackStallRatioCritical
        expr: |
          (
            sum(rate(gateway_client_playback_total{stage="stall",result="recorded"}[5m]))
            /
            clamp_min(sum(rate(gateway_client_playback_total{stage="start",result="recorded"}[5m])), 1e-6)
          ) > 0.35
          and
          sum(rate(gateway_client_playback_total{stage="start",result="recorded"}[5m])) > 0.1
        for: 5m
        labels:
          severity: critical
          area: experience
        annotations:
          summary: "Gateway client playback stall ratio is critical"
          description: "playback stall/start ratio > 0.35 for 5m"

      - alert: PipelineErrorRateHigh
        expr: |
          (
            sum by (service) (
              rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total",result="error"}[5m])
            )
            /
            clamp_min(
              sum by (service) (
                rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
              ),
              1e-6
            )
          ) > 0.01
          and
          sum by (service) (
            rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          area: pipeline
        annotations:
          summary: "Pipeline error ratio is high for {{ $labels.service }}"
          description: "ASR/Translation/TTS error ratio > 0.01 for 10m"

      - alert: PipelineErrorRateCritical
        expr: |
          (
            sum by (service) (
              rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total",result="error"}[5m])
            )
            /
            clamp_min(
              sum by (service) (
                rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
              ),
              1e-6
            )
          ) > 0.03
          and
          sum by (service) (
            rate({__name__=~"asr_pipeline_messages_total|translation_pipeline_messages_total|tts_pipeline_messages_total"}[5m])
          ) > 0.5
        for: 5m
        labels:
          severity: critical
          area: pipeline
        annotations:
          summary: "Pipeline error ratio is critical for {{ $labels.service }}"
          description: "ASR/Translation/TTS error ratio > 0.03 for 5m"

      - alert: AsrPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(asr_pipeline_duration_seconds_bucket[5m]))
          ) > 1.5
        for: 15m
        labels:
          severity: warning
          area: asr
        annotations:
          summary: "ASR pipeline p95 latency is high"
          description: "asr.pipeline.duration p95 > 1.5s for 15m"

      - alert: AsrPipelineP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(asr_pipeline_duration_seconds_bucket[5m]))
          ) > 3.0
        for: 5m
        labels:
          severity: critical
          area: asr
        annotations:
          summary: "ASR pipeline p95 latency is critical"
          description: "asr.pipeline.duration p95 > 3.0s for 5m"

      - alert: TranslationPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(translation_pipeline_duration_seconds_bucket[5m]))
          ) > 1.5
        for: 15m
        labels:
          severity: warning
          area: translation
        annotations:
          summary: "Translation pipeline p95 latency is high"
          description: "translation.pipeline.duration p95 > 1.5s for 15m"

      - alert: TranslationPipelineP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(translation_pipeline_duration_seconds_bucket[5m]))
          ) > 3.0
        for: 5m
        labels:
          severity: critical
          area: translation
        annotations:
          summary: "Translation pipeline p95 latency is critical"
          description: "translation.pipeline.duration p95 > 3.0s for 5m"

      - alert: TtsPipelineP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(tts_pipeline_duration_seconds_bucket[5m]))
          ) > 1.5
        for: 15m
        labels:
          severity: warning
          area: tts
        annotations:
          summary: "TTS pipeline p95 latency is high"
          description: "tts.pipeline.duration p95 > 1.5s for 15m"

      - alert: TtsPipelineP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(tts_pipeline_duration_seconds_bucket[5m]))
          ) > 3.0
        for: 5m
        labels:
          severity: critical
          area: tts
        annotations:
          summary: "TTS pipeline p95 latency is critical"
          description: "tts.pipeline.duration p95 > 3.0s for 5m"

      - alert: KafkaConsumerLagHigh
        expr: |
          max by (service, topic) (
            kafka_consumer_records_lag_max{
              service=~"speech-gateway|asr-worker|translation-worker|tts-orchestrator"
            }
          ) > 1200
        for: 10m
        labels:
          severity: warning
          area: kafka
        annotations:
          summary: "Kafka consumer lag is high"
          description: "kafka.consumer.records.lag.max > 1200 for 10m"

      - alert: KafkaConsumerLagCritical
        expr: |
          max by (service, topic) (
            kafka_consumer_records_lag_max{
              service=~"speech-gateway|asr-worker|translation-worker|tts-orchestrator"
            }
          ) > 5000
        for: 5m
        labels:
          severity: critical
          area: kafka
        annotations:
          summary: "Kafka consumer lag is critical"
          description: "kafka.consumer.records.lag.max > 5000 for 5m"

      - alert: OrchestratorControlPlaneFallbackSpike
        expr: |
          sum(rate(orchestrator_controlplane_policy_fallback_total[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Session orchestrator control-plane fallback is active"
          description: "orchestrator.controlplane.policy.fallback.total > 0.2/s for 10m"

      - alert: OrchestratorControlPlaneFallbackCritical
        expr: |
          sum(rate(orchestrator_controlplane_policy_fallback_total[5m])) > 1.0
        for: 5m
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Session orchestrator control-plane fallback is critical"
          description: "orchestrator.controlplane.policy.fallback.total > 1.0/s for 5m"

      - alert: ControlPlaneAuthDenyRateHigh
        expr: |
          (
            sum(
              rate(controlplane_auth_decision_total{
                backend="mode-switch",
                mode=~"external_iam|hybrid",
                outcome=~"unauthorized|forbidden"
              }[5m])
            )
            /
            clamp_min(
              sum(
                rate(controlplane_auth_decision_total{
                  backend="mode-switch",
                  mode=~"external_iam|hybrid"
                }[5m])
              ),
              1e-6
            )
          ) > 0.20
          and
          sum(
            rate(controlplane_auth_decision_total{
              backend="mode-switch",
              mode=~"external_iam|hybrid"
            }[5m])
          ) > 0.05
        for: 10m
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Control-plane auth deny ratio is high"
          description: "controlplane.auth.decision.total deny ratio > 0.20 for 10m"

      - alert: ControlPlaneAuthDenyRateCritical
        expr: |
          (
            sum(
              rate(controlplane_auth_decision_total{
                backend="mode-switch",
                mode=~"external_iam|hybrid",
                outcome=~"unauthorized|forbidden"
              }[5m])
            )
            /
            clamp_min(
              sum(
                rate(controlplane_auth_decision_total{
                  backend="mode-switch",
                  mode=~"external_iam|hybrid"
                }[5m])
              ),
              1e-6
            )
          ) > 0.40
          and
          sum(
            rate(controlplane_auth_decision_total{
              backend="mode-switch",
              mode=~"external_iam|hybrid"
            }[5m])
          ) > 0.10
        for: 5m
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Control-plane auth deny ratio is critical"
          description: "controlplane.auth.decision.total deny ratio > 0.40 for 5m"

      - alert: ControlPlaneExternalIamUnavailableWarning
        expr: |
          sum(
            rate(controlplane_auth_decision_total{
              backend="external-iam",
              reason="external_unavailable"
            }[5m])
          ) > 0.01
        for: 10m
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Control-plane external IAM unavailable warning"
          description: "controlplane.auth.decision.total{backend=external-iam,reason=external_unavailable} > 0.01/s for 10m"

      - alert: ControlPlaneExternalIamUnavailableSpike
        expr: |
          sum(
            rate(controlplane_auth_decision_total{
              backend="external-iam",
              reason="external_unavailable"
            }[5m])
          ) > 0.05
        for: 10m
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Control-plane external IAM unavailable spike"
          description: "controlplane.auth.decision.total{backend=external-iam,reason=external_unavailable} > 0.05/s for 10m"

      - alert: ControlPlaneHybridFallbackSpike
        expr: |
          sum(rate(controlplane_auth_hybrid_fallback_total[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          area: control-plane
        annotations:
          summary: "Control-plane hybrid auth fallback is active"
          description: "controlplane.auth.hybrid.fallback.total > 0.05/s for 10m"

      - alert: ControlPlaneHybridFallbackCritical
        expr: |
          sum(rate(controlplane_auth_hybrid_fallback_total[5m])) > 0.20
        for: 5m
        labels:
          severity: critical
          area: control-plane
        annotations:
          summary: "Control-plane hybrid auth fallback is critical"
          description: "controlplane.auth.hybrid.fallback.total > 0.20/s for 5m"
