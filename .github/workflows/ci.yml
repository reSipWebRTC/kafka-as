name: ci

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'docs/**'
      - 'chore/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Verify repository
        run: tools/verify.sh
