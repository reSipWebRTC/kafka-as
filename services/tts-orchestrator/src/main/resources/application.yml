spring:
  application:
    name: tts-orchestrator
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: ${TTS_CONSUMER_GROUP_ID:tts-orchestrator}
      auto-offset-reset: latest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${OBS_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [service=${spring.application.name:-unknown},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

tts:
  control-plane:
    enabled: ${TTS_CONTROL_PLANE_ENABLED:true}
    base-url: ${TTS_CONTROL_PLANE_BASE_URL:http://localhost:8085}
    request-timeout: ${TTS_CONTROL_PLANE_REQUEST_TIMEOUT:800ms}
    policy-cache-ttl: ${TTS_CONTROL_PLANE_POLICY_CACHE_TTL:30s}
    fallback-fail-open: ${TTS_CONTROL_PLANE_FALLBACK_FAIL_OPEN:true}
  kafka:
    enabled: ${TTS_KAFKA_ENABLED:true}
    translation-result-topic: ${TTS_TRANSLATION_RESULT_TOPIC:translation.result}
    tts-request-topic: ${TTS_REQUEST_TOPIC:tts.request}
    tts-chunk-topic: ${TTS_CHUNK_TOPIC:tts.chunk}
    tts-ready-topic: ${TTS_READY_TOPIC:tts.ready}
    producer-id: ${TTS_PRODUCER_ID:tts-orchestrator}
    default-voice: ${TTS_DEFAULT_VOICE:voice-default}
    stream-enabled: ${TTS_STREAM_ENABLED:true}
    tts-chunk-codec: ${TTS_CHUNK_CODEC:audio/pcm}
    tts-chunk-sample-rate: ${TTS_CHUNK_SAMPLE_RATE:16000}
    tts-ready-playback-url-prefix: ${TTS_READY_PLAYBACK_URL_PREFIX:https://cdn.local/tts}
    retry-max-attempts: ${TTS_RETRY_MAX_ATTEMPTS:3}
    retry-backoff-ms: ${TTS_RETRY_BACKOFF_MS:200}
    dlq-topic-suffix: ${TTS_DLQ_TOPIC_SUFFIX:.dlq}
    idempotency-enabled: ${TTS_IDEMPOTENCY_ENABLED:true}
    idempotency-ttl-ms: ${TTS_IDEMPOTENCY_TTL_MS:300000}
    compensation-topic: ${TTS_COMPENSATION_TOPIC:platform.compensation}
  voice-policy:
    mode: ${TTS_VOICE_POLICY_MODE:rule}
    http:
      endpoint: ${TTS_VOICE_POLICY_HTTP_ENDPOINT:}
      path: ${TTS_VOICE_POLICY_HTTP_PATH:/v1/voice/select}
      timeout-ms: ${TTS_VOICE_POLICY_HTTP_TIMEOUT_MS:1200}
      auth-token: ${TTS_VOICE_POLICY_HTTP_AUTH_TOKEN:}
  synthesis:
    mode: ${TTS_SYNTHESIS_MODE:placeholder}
    http:
      endpoint: ${TTS_SYNTHESIS_HTTP_ENDPOINT:}
      path: ${TTS_SYNTHESIS_HTTP_PATH:/v1/tts/synthesize}
      timeout-ms: ${TTS_SYNTHESIS_HTTP_TIMEOUT_MS:2000}
      auth-token: ${TTS_SYNTHESIS_HTTP_AUTH_TOKEN:}
  storage:
    enabled: ${TTS_STORAGE_ENABLED:false}
    provider: ${TTS_STORAGE_PROVIDER:none}
    bucket: ${TTS_STORAGE_BUCKET:}
    region: ${TTS_STORAGE_REGION:us-east-1}
    endpoint: ${TTS_STORAGE_ENDPOINT:}
    access-key: ${TTS_STORAGE_ACCESS_KEY:}
    secret-key: ${TTS_STORAGE_SECRET_KEY:}
    path-style-access: ${TTS_STORAGE_PATH_STYLE_ACCESS:true}
    key-prefix: ${TTS_STORAGE_KEY_PREFIX:tts}
    public-base-url: ${TTS_STORAGE_PUBLIC_BASE_URL:}
    object-suffix: ${TTS_STORAGE_OBJECT_SUFFIX:wav}
