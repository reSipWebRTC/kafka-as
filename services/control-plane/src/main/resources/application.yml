spring:
  application:
    name: control-plane
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${OBS_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [service=${spring.application.name:-unknown},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

control:
  auth:
    enabled: ${CONTROL_AUTH_ENABLED:false}
    mode: ${CONTROL_AUTH_MODE:static}
    tokens: ${CONTROL_AUTH_TOKENS:}
    credentials: []
    external:
      issuer: ${CONTROL_AUTH_EXTERNAL_ISSUER:}
      audience: ${CONTROL_AUTH_EXTERNAL_AUDIENCE:}
      jwks-uri: ${CONTROL_AUTH_EXTERNAL_JWKS_URI:}
      permission-claim: ${CONTROL_AUTH_EXTERNAL_PERMISSION_CLAIM:scp}
      tenant-claim: ${CONTROL_AUTH_EXTERNAL_TENANT_CLAIM:tenant_ids}
      read-permission: ${CONTROL_AUTH_EXTERNAL_READ_PERMISSION:control.policy.read}
      write-permission: ${CONTROL_AUTH_EXTERNAL_WRITE_PERMISSION:control.policy.write}
  kafka:
    enabled: ${CONTROL_KAFKA_ENABLED:false}
    policy-changed-topic: ${CONTROL_POLICY_CHANGED_TOPIC:tenant.policy.changed}
    producer-id: ${CONTROL_KAFKA_PRODUCER_ID:control-plane}
  policy-store:
    backend: ${CONTROL_POLICY_STORE_BACKEND:redis}
    key-prefix: ${CONTROL_POLICY_STORE_KEY_PREFIX:control:tenant-policy:}
    history-key-prefix: ${CONTROL_POLICY_STORE_HISTORY_KEY_PREFIX:control:tenant-policy:history:}
    jdbc-current-table: ${CONTROL_POLICY_STORE_JDBC_CURRENT_TABLE:control_tenant_policy_current}
    jdbc-history-table: ${CONTROL_POLICY_STORE_JDBC_HISTORY_TABLE:control_tenant_policy_history}
    history-max-entries: ${CONTROL_POLICY_STORE_HISTORY_MAX_ENTRIES:20}
    ttl: ${CONTROL_POLICY_STORE_TTL:12h}
