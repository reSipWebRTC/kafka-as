spring:
  application:
    name: control-plane
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${OBS_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [service=${spring.application.name:-unknown},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

control:
  policy-store:
    key-prefix: ${CONTROL_POLICY_STORE_KEY_PREFIX:control:tenant-policy:}
    ttl: ${CONTROL_POLICY_STORE_TTL:12h}
