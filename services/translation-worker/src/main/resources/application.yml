spring:
  application:
    name: translation-worker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: ${TRANSLATION_CONSUMER_GROUP_ID:translation-worker}
      auto-offset-reset: latest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${OBS_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [service=${spring.application.name:-unknown},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

translation:
  control-plane:
    enabled: ${TRANSLATION_CONTROL_PLANE_ENABLED:true}
    base-url: ${TRANSLATION_CONTROL_PLANE_BASE_URL:http://localhost:8085}
    request-timeout: ${TRANSLATION_CONTROL_PLANE_REQUEST_TIMEOUT:800ms}
    policy-cache-ttl: ${TRANSLATION_CONTROL_PLANE_POLICY_CACHE_TTL:30s}
    fallback-fail-open: ${TRANSLATION_CONTROL_PLANE_FALLBACK_FAIL_OPEN:true}
  kafka:
    enabled: ${TRANSLATION_KAFKA_ENABLED:true}
    asr-final-topic: ${TRANSLATION_ASR_FINAL_TOPIC:asr.final}
    translation-result-topic: ${TRANSLATION_RESULT_TOPIC:translation.result}
    producer-id: ${TRANSLATION_PRODUCER_ID:translation-worker}
    default-target-lang: ${TRANSLATION_DEFAULT_TARGET_LANG:en-US}
    engine-name: ${TRANSLATION_ENGINE_NAME:placeholder}
    retry-max-attempts: ${TRANSLATION_RETRY_MAX_ATTEMPTS:3}
    retry-backoff-ms: ${TRANSLATION_RETRY_BACKOFF_MS:200}
    dlq-topic-suffix: ${TRANSLATION_DLQ_TOPIC_SUFFIX:.dlq}
    idempotency-enabled: ${TRANSLATION_IDEMPOTENCY_ENABLED:true}
    idempotency-ttl-ms: ${TRANSLATION_IDEMPOTENCY_TTL_MS:300000}
    compensation-topic: ${TRANSLATION_COMPENSATION_TOPIC:platform.compensation}
  engine:
    mode: ${TRANSLATION_ENGINE_MODE:placeholder}
    http:
      endpoint: ${TRANSLATION_ENGINE_HTTP_ENDPOINT:}
      path: ${TRANSLATION_ENGINE_HTTP_PATH:/v1/translate}
      timeout-ms: ${TRANSLATION_ENGINE_HTTP_TIMEOUT_MS:1500}
      auth-token: ${TRANSLATION_ENGINE_HTTP_AUTH_TOKEN:}
      engine-name: ${TRANSLATION_ENGINE_HTTP_ENGINE_NAME:http-translation}
    openai:
      endpoint: ${TRANSLATION_ENGINE_OPENAI_ENDPOINT:}
      path: ${TRANSLATION_ENGINE_OPENAI_PATH:/v1/chat/completions}
      timeout-ms: ${TRANSLATION_ENGINE_OPENAI_TIMEOUT_MS:3000}
      api-key: ${TRANSLATION_ENGINE_OPENAI_API_KEY:}
      model: ${TRANSLATION_ENGINE_OPENAI_MODEL:gpt-4o-mini}
      temperature: ${TRANSLATION_ENGINE_OPENAI_TEMPERATURE:0.0}
      max-tokens: ${TRANSLATION_ENGINE_OPENAI_MAX_TOKENS:512}
      max-concurrent-requests: ${TRANSLATION_ENGINE_OPENAI_MAX_CONCURRENT_REQUESTS:16}
      health:
        enabled: ${TRANSLATION_ENGINE_OPENAI_HEALTH_ENABLED:false}
        path: ${TRANSLATION_ENGINE_OPENAI_HEALTH_PATH:/health}
        timeout-ms: ${TRANSLATION_ENGINE_OPENAI_HEALTH_TIMEOUT_MS:800}
        cache-ttl-ms: ${TRANSLATION_ENGINE_OPENAI_HEALTH_CACHE_TTL_MS:3000}
        fail-open-on-error: ${TRANSLATION_ENGINE_OPENAI_HEALTH_FAIL_OPEN_ON_ERROR:true}
      engine-name: ${TRANSLATION_ENGINE_OPENAI_ENGINE_NAME:openai-translation}
      system-prompt: ${TRANSLATION_ENGINE_OPENAI_SYSTEM_PROMPT:You are a translation engine. Return only translated text without explanation.}
