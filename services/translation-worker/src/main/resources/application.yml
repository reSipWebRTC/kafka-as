spring:
  application:
    name: translation-worker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: ${TRANSLATION_CONSUMER_GROUP_ID:translation-worker}
      auto-offset-reset: latest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

translation:
  kafka:
    enabled: ${TRANSLATION_KAFKA_ENABLED:true}
    asr-final-topic: ${TRANSLATION_ASR_FINAL_TOPIC:asr.final}
    translation-result-topic: ${TRANSLATION_RESULT_TOPIC:translation.result}
    producer-id: ${TRANSLATION_PRODUCER_ID:translation-worker}
    default-target-lang: ${TRANSLATION_DEFAULT_TARGET_LANG:en-US}
    engine-name: ${TRANSLATION_ENGINE_NAME:placeholder}
