spring:
  application:
    name: session-orchestrator
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${OBS_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [service=${spring.application.name:-unknown},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

orchestrator:
  kafka:
    enabled: ${ORCHESTRATOR_KAFKA_ENABLED:true}
    session-control-topic: ${ORCHESTRATOR_SESSION_CONTROL_TOPIC:session.control}
    producer-id: ${ORCHESTRATOR_PRODUCER_ID:session-orchestrator}
  session-store:
    key-prefix: ${ORCHESTRATOR_SESSION_STORE_KEY_PREFIX:orchestrator:session:}
    ttl: ${ORCHESTRATOR_SESSION_STORE_TTL:12h}
  control-plane:
    base-url: ${ORCHESTRATOR_CONTROL_PLANE_BASE_URL:http://localhost:8085}
    request-timeout: ${ORCHESTRATOR_CONTROL_PLANE_REQUEST_TIMEOUT:2s}
    circuit-breaker-failure-threshold: ${ORCHESTRATOR_CONTROL_PLANE_CB_FAILURE_THRESHOLD:3}
    circuit-breaker-open-duration: ${ORCHESTRATOR_CONTROL_PLANE_CB_OPEN_DURATION:5s}
    policy-cache-ttl: ${ORCHESTRATOR_CONTROL_PLANE_POLICY_CACHE_TTL:30s}
    fallback-fail-open: ${ORCHESTRATOR_CONTROL_PLANE_FALLBACK_FAIL_OPEN:false}
    policy-changed-topic: ${ORCHESTRATOR_CONTROL_PLANE_POLICY_CHANGED_TOPIC:tenant.policy.changed}
