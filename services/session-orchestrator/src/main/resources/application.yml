spring:
  application:
    name: session-orchestrator
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${OBS_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [service=${spring.application.name:-unknown},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

orchestrator:
  kafka:
    enabled: ${ORCHESTRATOR_KAFKA_ENABLED:true}
    session-control-topic: ${ORCHESTRATOR_SESSION_CONTROL_TOPIC:session.control}
    asr-partial-topic: ${ORCHESTRATOR_ASR_PARTIAL_TOPIC:asr.partial}
    asr-final-topic: ${ORCHESTRATOR_ASR_FINAL_TOPIC:asr.final}
    translation-result-topic: ${ORCHESTRATOR_TRANSLATION_RESULT_TOPIC:translation.result}
    tts-ready-topic: ${ORCHESTRATOR_TTS_READY_TOPIC:tts.ready}
    command-result-topic: ${ORCHESTRATOR_COMMAND_RESULT_TOPIC:command.result}
    platform-dlq-topic: ${ORCHESTRATOR_PLATFORM_DLQ_TOPIC:platform.dlq}
    compensation-topic: ${ORCHESTRATOR_COMPENSATION_TOPIC:platform.compensation}
    audit-topic: ${ORCHESTRATOR_AUDIT_TOPIC:platform.audit}
    producer-id: ${ORCHESTRATOR_PRODUCER_ID:session-orchestrator}
  session-store:
    key-prefix: ${ORCHESTRATOR_SESSION_STORE_KEY_PREFIX:orchestrator:session:}
    ttl: ${ORCHESTRATOR_SESSION_STORE_TTL:12h}
  session-orchestration:
    aggregation-enabled: ${ORCHESTRATOR_SESSION_AGGREGATION_ENABLED:true}
    idle-timeout: ${ORCHESTRATOR_SESSION_IDLE_TIMEOUT:2m}
    hard-timeout: ${ORCHESTRATOR_SESSION_HARD_TIMEOUT:30m}
    stalled-timeout: ${ORCHESTRATOR_SESSION_STALLED_TIMEOUT:0s}
    scan-interval: ${ORCHESTRATOR_SESSION_TIMEOUT_SCAN_INTERVAL:1s}
    close-timeout: ${ORCHESTRATOR_SESSION_CLOSE_TIMEOUT:3s}
    idle-timeout-reason: ${ORCHESTRATOR_SESSION_IDLE_TIMEOUT_REASON:timeout.idle}
    hard-timeout-reason: ${ORCHESTRATOR_SESSION_HARD_TIMEOUT_REASON:timeout.hard}
    stalled-timeout-reason-prefix: ${ORCHESTRATOR_SESSION_STALLED_TIMEOUT_REASON_PREFIX:timeout.stalled}
  compensation-saga:
    enabled: ${ORCHESTRATOR_COMPENSATION_SAGA_ENABLED:true}
    max-attempts: ${ORCHESTRATOR_COMPENSATION_SAGA_MAX_ATTEMPTS:3}
    retry-backoff: ${ORCHESTRATOR_COMPENSATION_SAGA_RETRY_BACKOFF:200ms}
    replay-output-mode: ${ORCHESTRATOR_COMPENSATION_SAGA_REPLAY_OUTPUT_MODE:source-topic}
    replay-fixed-topic: ${ORCHESTRATOR_COMPENSATION_SAGA_REPLAY_FIXED_TOPIC:}
    replay-key-field: ${ORCHESTRATOR_COMPENSATION_SAGA_REPLAY_KEY_FIELD:sessionId}
    replay-send-timeout: ${ORCHESTRATOR_COMPENSATION_SAGA_REPLAY_SEND_TIMEOUT:3s}
    session-close-timeout: ${ORCHESTRATOR_COMPENSATION_SAGA_SESSION_CLOSE_TIMEOUT:3s}
    close-reason-prefix: ${ORCHESTRATOR_COMPENSATION_SAGA_CLOSE_REASON_PREFIX:compensation.saga}
    publish-audit: ${ORCHESTRATOR_COMPENSATION_SAGA_PUBLISH_AUDIT:true}
    state-key-prefix: ${ORCHESTRATOR_COMPENSATION_SAGA_STATE_KEY_PREFIX:orchestrator:compensation:saga:}
    state-ttl: ${ORCHESTRATOR_COMPENSATION_SAGA_STATE_TTL:7d}
  control-plane:
    base-url: ${ORCHESTRATOR_CONTROL_PLANE_BASE_URL:http://localhost:8085}
    request-timeout: ${ORCHESTRATOR_CONTROL_PLANE_REQUEST_TIMEOUT:2s}
    circuit-breaker-failure-threshold: ${ORCHESTRATOR_CONTROL_PLANE_CB_FAILURE_THRESHOLD:3}
    circuit-breaker-open-duration: ${ORCHESTRATOR_CONTROL_PLANE_CB_OPEN_DURATION:5s}
    policy-cache-ttl: ${ORCHESTRATOR_CONTROL_PLANE_POLICY_CACHE_TTL:30s}
    fallback-fail-open: ${ORCHESTRATOR_CONTROL_PLANE_FALLBACK_FAIL_OPEN:false}
    policy-changed-topic: ${ORCHESTRATOR_CONTROL_PLANE_POLICY_CHANGED_TOPIC:tenant.policy.changed}
    policy-distribution-result-topic: ${ORCHESTRATOR_CONTROL_PLANE_POLICY_DISTRIBUTION_RESULT_TOPIC:tenant.policy.distribution.result}
    distribution-region: ${ORCHESTRATOR_CONTROL_PLANE_DISTRIBUTION_REGION:local}
    distribution-producer-id: ${ORCHESTRATOR_CONTROL_PLANE_DISTRIBUTION_PRODUCER_ID:session-orchestrator}
