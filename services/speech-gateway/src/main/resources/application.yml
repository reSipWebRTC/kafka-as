spring:
  application:
    name: speech-gateway
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: ${GATEWAY_DOWNLINK_CONSUMER_GROUP_ID:speech-gateway-downlink}
      auto-offset-reset: latest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${OBS_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [service=${spring.application.name:-unknown},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

gateway:
  kafka:
    enabled: ${GATEWAY_KAFKA_ENABLED:true}
    audio-ingress-topic: ${GATEWAY_AUDIO_INGRESS_TOPIC:audio.ingress.raw}
    tenant-id: ${GATEWAY_TENANT_ID:tenant-default}
    producer-id: ${GATEWAY_PRODUCER_ID:speech-gateway}
    channels: ${GATEWAY_AUDIO_CHANNELS:1}
  session-orchestrator:
    enabled: ${GATEWAY_SESSION_ORCHESTRATOR_ENABLED:true}
    base-url: ${GATEWAY_SESSION_ORCHESTRATOR_BASE_URL:http://localhost:8081}
    timeout: ${GATEWAY_SESSION_ORCHESTRATOR_TIMEOUT:2s}
  downlink:
    enabled: ${GATEWAY_DOWNLINK_ENABLED:true}
    consumer-group-id: ${GATEWAY_DOWNLINK_CONSUMER_GROUP_ID:speech-gateway-downlink}
    asr-partial-topic: ${GATEWAY_DOWNLINK_ASR_PARTIAL_TOPIC:asr.partial}
    translation-result-topic: ${GATEWAY_DOWNLINK_TRANSLATION_RESULT_TOPIC:translation.result}
    session-control-topic: ${GATEWAY_DOWNLINK_SESSION_CONTROL_TOPIC:session.control}
