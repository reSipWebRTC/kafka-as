spring:
  application:
    name: speech-gateway
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: ${GATEWAY_DOWNLINK_CONSUMER_GROUP_ID:speech-gateway-downlink}
      auto-offset-reset: latest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${OBS_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [service=${spring.application.name:-unknown},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

gateway:
  auth:
    enabled: ${GATEWAY_AUTH_ENABLED:false}
    query-param: ${GATEWAY_AUTH_QUERY_PARAM:access_token}
    tokens: ${GATEWAY_AUTH_TOKENS:}
  kafka:
    enabled: ${GATEWAY_KAFKA_ENABLED:true}
    audio-ingress-topic: ${GATEWAY_AUDIO_INGRESS_TOPIC:audio.ingress.raw}
    command-confirm-request-topic: ${GATEWAY_COMMAND_CONFIRM_REQUEST_TOPIC:command.confirm.request}
    tenant-id: ${GATEWAY_TENANT_ID:tenant-default}
    producer-id: ${GATEWAY_PRODUCER_ID:speech-gateway}
    channels: ${GATEWAY_AUDIO_CHANNELS:1}
  session-orchestrator:
    enabled: ${GATEWAY_SESSION_ORCHESTRATOR_ENABLED:true}
    base-url: ${GATEWAY_SESSION_ORCHESTRATOR_BASE_URL:http://localhost:8081}
    timeout: ${GATEWAY_SESSION_ORCHESTRATOR_TIMEOUT:2s}
  downlink:
    enabled: ${GATEWAY_DOWNLINK_ENABLED:true}
    consumer-group-id: ${GATEWAY_DOWNLINK_CONSUMER_GROUP_ID:speech-gateway-downlink}
    asr-partial-topic: ${GATEWAY_DOWNLINK_ASR_PARTIAL_TOPIC:asr.partial}
    translation-result-topic: ${GATEWAY_DOWNLINK_TRANSLATION_RESULT_TOPIC:translation.result}
    session-control-topic: ${GATEWAY_DOWNLINK_SESSION_CONTROL_TOPIC:session.control}
    tts-chunk-topic: ${GATEWAY_DOWNLINK_TTS_CHUNK_TOPIC:tts.chunk}
    tts-ready-topic: ${GATEWAY_DOWNLINK_TTS_READY_TOPIC:tts.ready}
    command-result-topic: ${GATEWAY_DOWNLINK_COMMAND_RESULT_TOPIC:command.result}
    retry-max-attempts: ${GATEWAY_DOWNLINK_RETRY_MAX_ATTEMPTS:3}
    retry-backoff-ms: ${GATEWAY_DOWNLINK_RETRY_BACKOFF_MS:200}
    dlq-topic-suffix: ${GATEWAY_DOWNLINK_DLQ_TOPIC_SUFFIX:.dlq}
    idempotency-enabled: ${GATEWAY_DOWNLINK_IDEMPOTENCY_ENABLED:true}
    idempotency-ttl-ms: ${GATEWAY_DOWNLINK_IDEMPOTENCY_TTL_MS:300000}
    compensation-topic: ${GATEWAY_DOWNLINK_COMPENSATION_TOPIC:platform.compensation}
  flow-control:
    enabled: ${GATEWAY_FLOW_CONTROL_ENABLED:true}
    audio-frame-rate-limit-per-second: ${GATEWAY_AUDIO_FRAME_RATE_LIMIT_PER_SECOND:50}
    audio-frame-max-inflight: ${GATEWAY_AUDIO_FRAME_MAX_INFLIGHT:8}
