spring:
  application:
    name: asr-worker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: ${ASR_CONSUMER_GROUP_ID:asr-worker}
      auto-offset-reset: latest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${OBS_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [service=${spring.application.name:-unknown},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

asr:
  control-plane:
    enabled: ${ASR_CONTROL_PLANE_ENABLED:true}
    base-url: ${ASR_CONTROL_PLANE_BASE_URL:http://localhost:8085}
    request-timeout: ${ASR_CONTROL_PLANE_REQUEST_TIMEOUT:800ms}
    policy-cache-ttl: ${ASR_CONTROL_PLANE_POLICY_CACHE_TTL:30s}
    fallback-fail-open: ${ASR_CONTROL_PLANE_FALLBACK_FAIL_OPEN:true}
    policy-changed-topic: ${ASR_CONTROL_PLANE_POLICY_CHANGED_TOPIC:tenant.policy.changed}
  kafka:
    enabled: ${ASR_KAFKA_ENABLED:true}
    audio-ingress-topic: ${ASR_AUDIO_INGRESS_TOPIC:audio.ingress.raw}
    asr-partial-topic: ${ASR_PARTIAL_TOPIC:asr.partial}
    asr-final-topic: ${ASR_FINAL_TOPIC:asr.final}
    producer-id: ${ASR_PRODUCER_ID:asr-worker}
    retry-max-attempts: ${ASR_RETRY_MAX_ATTEMPTS:3}
    retry-backoff-ms: ${ASR_RETRY_BACKOFF_MS:200}
    dlq-topic-suffix: ${ASR_DLQ_TOPIC_SUFFIX:.dlq}
    idempotency-enabled: ${ASR_IDEMPOTENCY_ENABLED:true}
    idempotency-ttl-ms: ${ASR_IDEMPOTENCY_TTL_MS:300000}
    compensation-topic: ${ASR_COMPENSATION_TOPIC:platform.compensation}
    audit-topic: ${ASR_AUDIT_TOPIC:platform.audit}
    platform-dlq-topic: ${ASR_PLATFORM_DLQ_TOPIC:platform.dlq}
  inference:
    mode: ${ASR_INFERENCE_MODE:placeholder}
    vad:
      enabled: ${ASR_VAD_ENABLED:true}
      silence-frames-to-finalize: ${ASR_VAD_SILENCE_FRAMES_TO_FINALIZE:8}
      min-active-frames-per-segment: ${ASR_VAD_MIN_ACTIVE_FRAMES_PER_SEGMENT:2}
      silence-amplitude-threshold: ${ASR_VAD_SILENCE_AMPLITUDE_THRESHOLD:512}
      audio-codec: ${ASR_VAD_AUDIO_CODEC:pcm16le}
    http:
      endpoint: ${ASR_INFERENCE_HTTP_ENDPOINT:}
      path: ${ASR_INFERENCE_HTTP_PATH:/v1/asr/infer}
      timeout-ms: ${ASR_INFERENCE_HTTP_TIMEOUT_MS:1500}
      auth-token: ${ASR_INFERENCE_HTTP_AUTH_TOKEN:}
    funasr:
      endpoint: ${ASR_FUNASR_ENDPOINT:}
      path: ${ASR_FUNASR_PATH:/v1/asr}
      timeout-ms: ${ASR_FUNASR_TIMEOUT_MS:3000}
      auth-token: ${ASR_FUNASR_AUTH_TOKEN:}
      model: ${ASR_FUNASR_MODEL:paraformer-zh}
      language: ${ASR_FUNASR_LANGUAGE:auto}
      hotwords: ${ASR_FUNASR_HOTWORDS:}
      audio-format: ${ASR_FUNASR_AUDIO_FORMAT:pcm}
      default-sample-rate: ${ASR_FUNASR_DEFAULT_SAMPLE_RATE:16000}
      enable-inverse-text-normalization: ${ASR_FUNASR_ENABLE_ITN:true}
      max-concurrent-requests: ${ASR_FUNASR_MAX_CONCURRENT_REQUESTS:16}
      health:
        enabled: ${ASR_FUNASR_HEALTH_ENABLED:false}
        path: ${ASR_FUNASR_HEALTH_PATH:/health}
        timeout-ms: ${ASR_FUNASR_HEALTH_TIMEOUT_MS:800}
        cache-ttl-ms: ${ASR_FUNASR_HEALTH_CACHE_TTL_MS:3000}
        fail-open-on-error: ${ASR_FUNASR_HEALTH_FAIL_OPEN_ON_ERROR:true}
