spring:
  application:
    name: asr-worker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: ${ASR_CONSUMER_GROUP_ID:asr-worker}
      auto-offset-reset: latest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${OBS_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [service=${spring.application.name:-unknown},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

asr:
  kafka:
    enabled: ${ASR_KAFKA_ENABLED:true}
    audio-ingress-topic: ${ASR_AUDIO_INGRESS_TOPIC:audio.ingress.raw}
    asr-final-topic: ${ASR_FINAL_TOPIC:asr.final}
    producer-id: ${ASR_PRODUCER_ID:asr-worker}
